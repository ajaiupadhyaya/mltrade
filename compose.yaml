services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: mltrade
      POSTGRES_USER: mltrade
      POSTGRES_PASSWORD: mltrade
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mltrade -d mltrade"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - mltrade-postgres:/var/lib/postgresql/data

volumes:
  mltrade-postgres:
